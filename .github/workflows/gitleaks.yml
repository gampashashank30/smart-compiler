name: Gitleaks

on:
  push:
  pull_request:

# Lock down all permissions by default — only grant what is actually needed.
# This satisfies the GitHub CodeQL "Workflow does not contain permissions" rule.
permissions: read-all

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read          # needed by actions/checkout to clone the repo
      security-events: write  # needed by gitleaks-action to upload SARIF to GitHub Security tab
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
